<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=430, initial-scale=1.0">
  <title>Mini Download Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">MDH</div>
      <div class="brand-copy">
        <h1>Mini Download Helper</h1>
        <div class="subtitle" id="subtitle">Carregando…</div>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="settingsBtn" class="ghost" type="button" title="Abrir configurações">Configurações</button>
      <button id="clearDownloadedBtn" class="ghost" type="button" title="Remover downloads concluídos">Limpar concluídos</button>
      <button id="clearAllBtn" class="ghost danger-ghost" type="button" title="Remover todos os itens detectados">Limpar tudo</button>
    </div>
  </header>

  <main>
    <section id="groups"></section>

    <section id="logsSection">
      <details>
        <summary>Logs</summary>
        <div id="logs"></div>
      </details>
    </section>
  </main>

  <!-- Group template -->
  <template id="groupTemplate">
    <article class="group">
      <div class="group-header">
        <div class="group-title-wrap">
          <div class="group-title"></div>
          <a class="page-link" target="_blank" rel="noreferrer">Abrir página</a>
          <div class="group-meta"></div>
        </div>
      </div>

      <div class="group-items"></div>
    </article>
  </template>

  <!-- Item template -->
  <template id="itemTemplate">
    <div class="item">
      <div class="item-left">
        <img class="thumb" alt="Thumbnail">
      </div>

      <div class="item-right">
        <div class="line-1">
          <div class="item-title"></div>
          <span class="status"></span>
        </div>

        <div class="line-2">
          <span class="item-type"></span>
          <span class="dot">•</span>
          <span class="item-file"></span>
        </div>

        <div class="line-3">
          <select class="variant-select"></select>
        </div>

        <div class="progress-row hidden">
          <div class="progress-bar">
            <div class="progress-bar-inner"></div>
          </div>
          <span class="progress-text"></span>
        </div>

        <div class="actions">
          <button class="download-btn primary" type="button">Baixar</button>
          <button class="download-as-btn" type="button">Salvar como</button>
          <button class="copy-btn compact" type="button" title="Copiar URL da mídia">Copiar</button>
          <button class="pin-btn compact" type="button" title="Fixar item">Fixar</button>
          <button class="forget-btn danger compact" type="button" title="Remover item">Remover</button>
        </div>
      </div>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
